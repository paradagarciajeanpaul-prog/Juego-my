<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPG PRO FINAL</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">

<style>
body { margin:0; overflow:hidden; background:#111; color:white; font-family:Arial; }
canvas { display:block; }

#battleUI {
  position:fixed;
  bottom:0;
  width:100%;
  background:#000;
  padding:10px;
  display:none;
}

#inventoryUI {
  position:fixed;
  right:10px;
  top:10px;
  background:#000;
  padding:10px;
}

input { width:90%; padding:10px; }
button { padding:10px; margin:5px; }
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="inventoryUI">
🎒 Inventory:<br>
<span id="inv"></span>
</div>

<div id="battleUI">
<p id="battleText"></p>
<p id="instruction"></p>
<input id="input" placeholder="Write sentence..." />
<br>
<button onclick="attack()">⚔️ Attack</button>
<button onclick="heal()">🧪 Heal</button>
</div>

<script>

// CANVAS
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

// ESTADO
let state = "map";

// PLAYER
let player = {
  x:100,
  y:100,
  hp:100,
  gold:0
};

// INVENTARIO
let inventory = [];

// MAPA
const TILE = 50;
let map = [];

for(let y=0;y<20;y++){
  map[y]=[];
  for(let x=0;x<20;x++){
    map[y][x] = Math.random()<0.2 ? 1 : 0;
  }
}

// ENEMIGOS
let enemies = [];
for(let i=0;i<5;i++){
  enemies.push({x:Math.random()*800,y:Math.random()*800,hp:50});
}

// NPC
let npc = { x:300, y:300 };

// QUEST
let quest = {
  active:false,
  target:3,
  progress:0,
  reward:50
};

// COMBATE
let currentEnemy=null;
let verbs=["run","eat","play"];
let currentVerb="";

// ING
function toIng(v){
  if(v.endsWith("e")) return v.slice(0,-1)+"ing";
  return v+"ing";
}

// INICIAR COMBATE
function startBattle(e){
  state="battle";
  currentEnemy=e;
  currentVerb=verbs[Math.floor(Math.random()*verbs.length)];

  battleUI.style.display="block";
  instruction.innerText="Use: I am "+toIng(currentVerb)+"...";
}

// ATAQUE
function attack(){
  let val=input.value.toLowerCase();

  if(val.includes(toIng(currentVerb))){
    currentEnemy.hp-=20;
    battleText.innerText="✅ Good!";

    // DROPS
    if(Math.random()<0.5){
      inventory.push("Potion");
    }

  }else{
    player.hp-=10;
    battleText.innerText="❌ Wrong!";
  }

  input.value="";

  if(currentEnemy.hp<=0){

    if(quest.active){
      quest.progress++;
      if(quest.progress>=quest.target){
        player.gold += quest.reward;
        quest.active=false;
        alert("🎉 Mission complete!");
      }
    }

    state="map";
    battleUI.style.display="none";
  }
}

// HEAL
function heal(){
  let i = inventory.indexOf("Potion");

  if(i !== -1){
    inventory.splice(i,1);
    player.hp += 20;
    if(player.hp>100) player.hp=100;
  }
}

// START QUEST
function startQuest(){
  quest.active=true;
  quest.progress=0;
  alert("📜 Defeat 3 enemies");
}

// COLISIÓN
function collide(a,b){
  return Math.hypot(a.x-b.x,a.y-b.y)<30;
}

// TECLADO
let keys={};
window.addEventListener("keydown",e=>keys[e.key]=true);
window.addEventListener("keyup",e=>keys[e.key]=false);

// UPDATE
function update(){

  if(state==="map"){

    if(keys["ArrowUp"]) player.y-=3;
    if(keys["ArrowDown"]) player.y+=3;
    if(keys["ArrowLeft"]) player.x-=3;
    if(keys["ArrowRight"]) player.x+=3;

    enemies.forEach(e=>{
      if(collide(player,e)){
        startBattle(e);
      }
    });

    // NPC
    if(collide(player,npc)){
      if(!quest.active){
        startQuest();
      }
    }
  }

  // UI INVENTARIO
  inv.innerText = inventory.join(", ");
}

// DRAW
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(state==="map"){

    for(let y=0;y<map.length;y++){
      for(let x=0;x<map[y].length;x++){
        ctx.fillStyle = map[y][x]===1 ? "#145a32" : "#27ae60";
        ctx.fillRect(x*TILE,y*TILE,TILE,TILE);
      }
    }

    ctx.fillStyle="blue";
    ctx.fillRect(player.x,player.y,30,30);

    ctx.fillStyle="red";
    enemies.forEach(e=>{
      ctx.fillRect(e.x,e.y,30,30);
    });

    ctx.fillStyle="yellow";
    ctx.fillRect(npc.x,npc.y,30,30);

    ctx.fillStyle="white";
    ctx.fillText(
      quest.active 
        ? "Mission: "+quest.progress+"/"+quest.target 
        : "Talk to NPC",
      20,20
    );
  }

  if(state==="battle"){
    ctx.fillStyle="black";
    ctx.fillRect(0,0,canvas.width,canvas.height);
  }
}

// LOOP
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();

</script>

<!-- SERVICE WORKER -->
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
